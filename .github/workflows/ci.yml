name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Run shellcheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: "packages/lib"
          format: tty
          severity: warning

  python-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Check Python syntax
        run: |
          python -m py_compile packages/lib/src/core/*.py
          python -m py_compile packages/lib/src/providers/**/*.py
