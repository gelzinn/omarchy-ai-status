name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Bump version
        id: version
        run: |
          CURRENT=$(cat VERSION)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEW="$MAJOR.$MINOR.$((PATCH + 1))"
          echo "$NEW" > VERSION
          echo "new=$NEW" >> $GITHUB_OUTPUT

      - name: Commit version bump and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "chore: bump version to ${{ steps.version.outputs.new }} [skip ci]"
          git tag "v${{ steps.version.outputs.new }}"
          git push origin HEAD:main
          git push origin "v${{ steps.version.outputs.new }}"

      - name: Generate release body
        env:
          TAG: v${{ steps.version.outputs.new }}
        run: |
          VERSION="${{ steps.version.outputs.new }}"

          PREV_TAG=$(git tag --sort=-v:refname | grep -Fxv "$TAG" | head -1)

          awk -v ver="$VERSION" '
            BEGIN { hdr = "## [" ver "]" }
            index($0, hdr) == 1 { flag=1; next }
            flag && index($0, "## [") == 1 { exit }
            flag { print }
          ' CHANGELOG.md > changelog_section.md

          {
            if [ -s changelog_section.md ]; then
              echo "## What's changed"
              echo
              cat changelog_section.md
            fi

            echo "## Install"
            echo
            echo '```bash'
            echo "bash <(curl -fsSL https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${TAG}/install.sh)"
            echo '```'

            if [ -n "$PREV_TAG" ]; then
              echo
              echo "**Full diff**: https://github.com/${GITHUB_REPOSITORY}/compare/${PREV_TAG}...${TAG}"
            fi
          } > body.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.version.outputs.new }}"
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --notes-file body.md
          else
            gh release create "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$TAG" \
              --notes-file body.md \
              --latest
          fi
